name: Openverse
description: >
  Openverse is a search engine providing programmatic access to the world's
  largest openly-licensed media catalog, covering 800M+ images and audio tracks
  from cultural institutions, museums, and creative commons sources including
  Flickr, Wikimedia Commons, iNaturalist, Europeana, Freesound, Jamendo, and
  more. Built by WordPress/Automattic under Creative Commons licensing principles.
image: https://openverse.org/openverse-logo.svg
tags:
  - Images
  - Audio
  - Creative Commons
  - Open Media
  - Search
  - Open Data
  - Cultural Heritage
  - Museums
url: https://openverse.org
apis:
  - name: Openverse API
    description: >
      REST API providing search and retrieval of openly-licensed images and audio
      from 800M+ works across cultural institutions, museums, and creative commons
      sources. Supports full-text search, license filtering, source filtering, and
      media metadata retrieval. OAuth2 authentication available for higher rate limits.
    image: https://openverse.org/openverse-logo.svg
    humanURL: https://api.openverse.org/v1/
    baseURL: https://api.openverse.org/v1
    tags:
